name: Test Sinyi IP block (temporary)

on:
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe sinyi.com.tw from Actions runner
        run: |
          curl -sS -o /tmp/body.html -w "HTTP_STATUS:%{http_code}\n" \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
            "https://www.sinyi.com.tw/rent/list/"
          echo "--- body length ---"
          wc -c /tmp/body.html
          echo "--- 元/月 count ---"
          grep -o "元/月" /tmp/body.html | wc -l
          echo "--- first 500 chars ---"
          head -c 500 /tmp/body.html
